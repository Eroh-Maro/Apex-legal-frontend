<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="reset.css">
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/doopzrzep/image/upload/v1780224110/Asset_132_300x_grtslt.png">
</head>
<body>
    <div class="container">
        

            <header class="spinner">
                
                <div class="heading">
                    <figure class="logo">
                    <img src="https://res.cloudinary.com/doopzrzep/image/upload/v1780224110/Asset_132_300x_grtslt.png" alt="Apex Legal Logo">
                    </figure>

                    
                    <h1>Apex</h1>
                    
                </div>
                <p class="header-p">Legal Operations</p>

            </header>
            
            <section class="signin-header">
                <h2>Forgot Password</h2>
                <p>Enter your email and we'll send you a link to reset your password.</p>
            </section>

            <section class="login-section">
                <form class="form">

                    <div class="input-group">     
                        <label for="email">Email Address</label>
                        <input class="form-control" type="email" id="email" placeholder="      attoney@firm.com" required>
                        <img src="https://res.cloudinary.com/doopzrzep/image/upload/v1780349653/icons8-email-32_nzh4lw.png" alt="Email Icon" class="email-icon">
                    </div>

                    

                    

                    <div class="input-group primary-btn-group">
                        <button type="submit" class="primary-btn" id="primary-btn"> <a href="#"> Send Reset Link</a> </button>
                    </div>

                </form>
            </section>
 
            <footer class="footer">

                
                

                <div class="footer-section">

                        <button type="button" class="footer-btn" id="footer-btn"> 
                            <img src="https://res.cloudinary.com/doopzrzep/image/upload/v1780325934/icons8-back-arrow-32_bjtpsj.png" alt="Back Arrow Icon">
                            
                            <span> 
                                Back to <a href="../login/login.html" target="_blank">Login</a> 
                            </span>
                        </button>
                        
                        
                    
                    
                </div>
            </footer>
            
        </div>
    </div>

    

    
    <script src="reset.js"></script>
</body>
</html>
