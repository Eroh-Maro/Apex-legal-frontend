<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/doopzrzep/image/upload/v1780224110/Asset_132_300x_grtslt.png">
    <link rel="stylesheet" href="resetpassword.css">
</head>
<body>

    <div class="container">
        

            <header class="spinner">
                
                <div class="heading">
                    <figure class="logo">
                    <img src="https://res.cloudinary.com/doopzrzep/image/upload/v1780224110/Asset_132_300x_grtslt.png" alt="Apex Legal Logo">
                    </figure>

                    
                    <h1>Apex</h1>
                    
                </div>
                <p class="header-p">Legal Operations</p>

            </header>
            
            <section class="signin-header">
                <h2>Reset Password</h2>
                <p>Create a new, secure password for your account.</p>
            </section>

            <section class="login-section">
                <form class="form">

                    <div class="input-group">     
                        <label for="new-password">New Password</label>
                        <input class="form-control" type="password" id="new-password" placeholder="Enter your new password" required>
                        <button type="button" class="toggle-password" data-target="#new-password">
                            <img src="https://res.cloudinary.com/doopzrzep/image/upload/v1780301940/icons8-eye-24_vicmea.png" alt="Toggle Password Visibility">

                        </button> 
                    </div>

                    <div class="input-group">

                        <div class="password-header">
                            <p>Password Strength</p>
                            <span id="strength-text">Weak</span>
                        </div>  
                        
                    

                        <div class="strength-track">
                            <div class="strength-bar" id="strength-bar"></div>
                        </div>
                        
                        <div class="strength-text"></div>

                        <div class="password-requirements">
                            <p> Use 8+ characters with a mix of letters, numbers, & symbols </p>
                        </div>
                        
                    </div>  

                    <div class="input-group">
                        <div class="password-header">
                            <label for="confirm-password">Confirm New Password</label>
                        </div>
                        <input class="form-control" type="password" id="confirm-password" placeholder="Confirm your new password" required>
                        <button type="button" class="toggle-password" data-target="#confirm-password">
                            <img src="https://res.cloudinary.com/doopzrzep/image/upload/v1780301940/icons8-eye-24_vicmea.png" alt="Toggle Password Visibility">

                        </button> 
                    </div>

                    

                    <div class="input-group primary-btn-group">
                        <button type="submit" class="primary-btn" id="primary-btn"> 
                            <a href="#"> Update Password </a> 
                            <img src="https://res.cloudinary.com/doopzrzep/image/upload/v1780325470/icons8-lock-orientation-24_pj9ote.png" alt="Reload Icon">    
                        </button>
                    </div>

                </form>
            </section>

            <footer class="footer">
                
                <div class="footer-section">

                        <button type="button" class="footer-btn" id="footer-btn"> 
                            <img src="https://res.cloudinary.com/doopzrzep/image/upload/v1780325934/icons8-back-arrow-32_bjtpsj.png" alt="Back Arrow Icon">
                            
                            <span> 
                                Back to <a href="../login/login.html" target="_blank">Login</a> 
                            </span>
                        </button>
                    
                </div>
            </footer>

            
        </div>
    </div>

    
    <script src="resetpassword.js"></script>
</body>
</html>
